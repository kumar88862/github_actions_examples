name: environment vaiable example 

on: 
  workflow_dispatch

env:
  name: workflow-level
jobs:
  tests:
    runs-on: ubuntu-latest
    env:
     name: job-level

     steps:
       - name: step without override
         run: echo "value $name"
       - name: step with override
         env:
           name: step-level
         run: echo "value $name"

